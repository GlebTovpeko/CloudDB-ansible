---
# мастер
- name: Configure Master Server
  block:
    - name: Install python3-psycopg2 on Master
      apt:
        name: python3-psycopg2
        state: present

    - name: Create replication user on Master
      postgresql_user:
        name: "{{ master_user }}"
        password: "{{ master_password }}"
        role_attr_flags: REPLICATION,LOGIN
      become: true
      become_user: postgres

    - name: Allow replicas to connect in pg_hba.conf
      postgresql_pg_hba:
        dest: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
        contype: host
        databases: replication
        users: "{{ master_user }}"
        address: "{{ item }}"
        method: scram-sha-256
      loop: "{{ groups['slaves'] | map('extract', hostvars, 'ansible_host') | list }}"
      notify: Reload PostgreSQL

    - name: Ensure Master listens on all addresses
      lineinfile:
        path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
        regexp: "^#?listen_addresses ="
        line: "listen_addresses = '*'"
      notify: Restart PostgreSQL

  when: inventory_hostname in groups['master']

# реплики
- name: Configure Replica Servers
  block:
    - name: Install PostgreSQL on Replicas
      apt:
        name: "postgresql-{{ postgresql_version }}"
        state: present

    - name: Stop PostgreSQL before cloning
      service:
        name: postgresql
        state: stopped

    - name: Clean data directory
      file:
        path: "{{ postgres_data_dir }}"
        state: absent

    - name: Clone data via pg_basebackup
      become: true
      become_user: postgres
      shell: >
        PGPASSWORD='{{ master_password }}' pg_basebackup 
        -h {{ hostvars[groups['master'][0]]['ansible_host'] }} 
        -D {{ postgres_data_dir }} 
        -U {{ master_user }} 
        -v -R -P
      

    - name: Start PostgreSQL on Replica
      service:
        name: postgresql
        state: started
        enabled: yes

  when: inventory_hostname in groups['slaves']
